# Codecov configuration
# Validate: curl --fail --data-binary @codecov.yml https://api.codecov.io/validate

codecov:
  # Pin this config to main — feature branches cannot override coverage gates
  strict_yaml_branch: main
  # Do not post Codecov statuses if the CI build itself failed
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  # Below 75% shows yellow/red; above is green — reflects the 75% gate
  range: "75...100"

  status:
    # ── Overall project coverage vs. base commit ──────────────────────────
    project:
      default:
        target: 75%
        threshold: 2%      # Allow up to a 2% drop before failing
        if_ci_failed: error
        if_not_found: success
        flags:
          - unittests

    # ── Coverage of lines changed in this PR only ─────────────────────────
    patch:
      default:
        target: 80%
        threshold: 5%      # Lenient buffer for new code in PRs
        if_ci_failed: error
        if_not_found: success  # Pass on config/docs-only PRs with no Python changes
        only_pulls: true       # Patch check is only meaningful on pull requests
        flags:
          - unittests

    # Disable the default 'changes' check — project + patch already cover everything
    changes: false

parsers:
  cobertura:
    # Improve branch coverage accuracy from coverage.py Cobertura XML output
    handle_missing_conditions: true

flags:
  unittests:
    # Tests always run on every commit — no need to carry forward old coverage
    carryforward: false

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  # Only post a PR comment when coverage actually changes — reduces noise
  require_changes: true

github_checks:
  # Show inline coverage annotations on PR diffs
  annotations: true

# Files excluded from coverage reporting.
# Mirrors [tool.coverage.run] omit in pyproject.toml for consistency.
ignore:
  - "**/migrations/**"
  - "**/tests/**"
  - "**/conftest.py"
  - "manage.py"
  - "**/check.py"
  - "**/apps.py"
  - "**/wsgi.py"
  - "**/asgi.py"
  - "**/settings.py"
  - "**/templates/**"
  - "**/docs/**"
  - "**/assets/**"
  - "**/static/**"
  - "**/htmlcov/**"
