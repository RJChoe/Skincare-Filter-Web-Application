name: UV Export Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - 'uv.lock'
      - 'pyproject.toml'
  pull_request:
    branches:
      - main
      - develop

# Cancel superseded runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read


env:
  PYTHONUNBUFFERED: "1"

jobs:
  validate-exports:
    name: Validate Requirements Export
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-uv

      - name: Validate Lockfile Consistency
        run: |
          uv lock --check

      - name: Smoke test - export requirements.txt
        run: |
          uv export --no-dev --no-hashes --format requirements-txt -o /tmp/requirements.txt

      - name: Validate environment is buildable
        run: |
          uv sync --frozen

      - name: Smoke test - export requirements-dev.txt
        run: |
          uv export --no-hashes --format requirements-txt --group dev -o /tmp/requirements-dev.txt

      - name: Success
        if: success()
        run: |
          echo "✅ Lockfile is consistent and all exports succeed"
