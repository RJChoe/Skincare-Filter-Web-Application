name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel superseded runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  DJANGO_SETTINGS_MODULE: "skincare_project.settings"

jobs:
  # ============================================================================
  # Validate Dependency Groups - Ensures each group installs independently
  # ============================================================================
  validate-groups:
    name: Validate ${{ matrix.group }} group
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [test, lint, type-check, security]
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-uv

      - name: Validate ${{ matrix.group }} group installs
        run: |
          uv sync --group ${{ matrix.group }}

  # ============================================================================
  # Lint Job - Guards the test job
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-uv

      - name: Install dependencies
        run: |
          uv sync --group lint

      - name: Run pre-commit (ruff, ruff-format, mypy)
        run: |
          uv run pre-commit run --all-files

  # ============================================================================
  # Test Job - Depends on successful static analysis
  # ============================================================================
  test:
    name: Test (Python 3.13)
    runs-on: ubuntu-latest
    needs: [validate-groups, static-analysis]
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write       # codecov: post check run
      pull-requests: write # codecov: post PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-uv

      - name: Install dependencies
        run: |
          uv sync --group test

      - name: Run migrations
        run: |
          uv run python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          uv run pytest

      - name: Verify coverage.xml generated
        run: |
          if [ ! -f coverage.xml ]; then
            echo "❌ coverage.xml not found! pytest should generate it via --cov-report=xml"
            exit 1
          fi
          echo "✅ coverage.xml exists"

      - name: Upload coverage to Codecov
        if: github.event.pull_request.head.repo.fork == false
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================================
  # Static Analysis Job - Guards the test job
  # ============================================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: [validate-groups, lint]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-uv

      - name: Install dependencies
        run: |
          uv sync --group type-check --group security

      - name: Run bandit
        run: |
          uv run bandit -r . --severity-level high --confidence-level high -x .git,__pycache__,.venv,venv,migrations,.pytest_cache,htmlcov,.tox,build,dist,assets,media,static -f json -o bandit-output.json

      - name: Upload bandit report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bandit-report
          path: bandit-output.json

      - name: Run safety via uv
        continue-on-error: true
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          # --non-interactive: bypasses the initialization prompt
          # --disable-optional-telemetry: keeps the scan private/fast
          uv run safety scan --non-interactive --output json --disable-optional-telemetry > safety-output.json

      - name: Annotate safety results
        if: ${{ always() }}
        continue-on-error: true
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          from pathlib import Path

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", os.devnull)
          report = Path("safety-output.json")

          def write_summary(lines):
              with open(summary_file, "a", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")

          if not report.exists() or report.stat().st_size == 0:
              write_summary([
                  "### \U0001f512 Safety Vulnerability Scan",
                  "",
                  "\u26a0\ufe0f No safety report found or report was empty.",
              ])
              sys.exit(0)

          try:
              data = json.loads(report.read_text(encoding="utf-8"))
          except json.JSONDecodeError:
              write_summary([
                  "### \U0001f512 Safety Vulnerability Scan",
                  "",
                  "\u26a0\ufe0f Could not parse safety-output.json.",
              ])
              sys.exit(0)

          vulns = None
          try:
              vulns = data["vulnerabilities"]
          except KeyError:
              try:
                  vulns = data["scan_results"]["vulnerabilities"]
              except (KeyError, TypeError):
                  pass

          lines = ["### \U0001f512 Safety Vulnerability Scan", ""]
          if vulns is None:
              lines.append("\u26a0\ufe0f Could not identify vulnerability list (unexpected schema).")
          elif not vulns:
              lines.append("\u2705 No vulnerabilities found.")
          else:
              lines.append(f"\u274c **{len(vulns)} vulnerability(s) found**")
              lines.append("")
              lines.append("| Package | CVE | Severity | Advisory |")
              lines.append("| :--- | :--- | :--- | :--- |")
              for v in vulns:
                  pkg = v.get("package_name") or v.get("package", "unknown")
                  cve = v.get("CVE") or v.get("cve") or v.get("vulnerability_id", "N/A")
                  sev = v.get("severity") or v.get("cvss_v3_severity", "unknown")
                  adv = (v.get("advisory") or "")[:80]
                  lines.append(f"| {pkg} | {cve} | {sev} | {adv} |")
                  print(f"::warning title=Safety::{pkg} {cve} ({sev})")

          write_summary(lines)
          PYEOF

      - name: Upload safety report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: safety-report
          path: safety-output.json

  # ============================================================================
  # Aggregate CI status for branch protection
  # ============================================================================
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    needs: [validate-groups, lint, static-analysis, test]
    if: ${{ always() }}

    steps:
      - name: Write CI Summary Report
        if: ${{ always() }}
        run: |
          map_status() {
            case "$1" in
              success)
                echo "✅ Pass"
                ;;
              failure)
                echo "❌ Fail"
                ;;
              cancelled)
                echo "❌ Cancelled"
                ;;
              *)
                echo "⚠️ Warning"
                ;;
            esac
          }

          echo "### CI Status Report 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          VALIDATE_GROUPS_STATUS=$(map_status "${{ needs['validate-groups'].result }}")
          LINT_STATUS=$(map_status "${{ needs.lint.result }}")
          STATIC_ANALYSIS_STATUS=$(map_status "${{ needs['static-analysis'].result }}")
          TEST_STATUS=$(map_status "${{ needs.test.result }}")

          echo "| Validate Groups | $VALIDATE_GROUPS_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | $LINT_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis | $STATIC_ANALYSIS_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Test (Matrix) | $TEST_STATUS |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [Bandit Security Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "- [Safety Vulnerability Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY

      - name: Enforce aggregate status
        run: |
          if [ "${{ needs['validate-groups'].result }}" = "success" ] && [ "${{ needs.lint.result }}" = "success" ] && [ "${{ needs['static-analysis'].result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]; then
            echo "All required jobs succeeded."
            exit 0
          else
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
