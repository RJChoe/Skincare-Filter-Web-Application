# Pre-commit hooks configuration
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

fail_fast: false
default_language_version:
  python: "3.13"

repos:
  # ============================================================================
  # Stage 1: File Hygiene Checks (Fast, no external dependencies)
  # ============================================================================
  # General pre-commit hooks for code quality and safety
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Remove trailing whitespace
      - id: trailing-whitespace
      # Ensure files end with newline
      - id: end-of-file-fixer
      # Prevent merge conflicts from being committed
      - id: check-merge-conflict
      # Validate JSON files
      - id: check-json
      # Validate TOML files
      - id: check-toml
      # Validate YAML files (--unsafe enables unsafe constructors)
      - id: check-yaml
        args: [--unsafe]
      # Prevent accidental commits of large files
      - id: check-added-large-files
        args: [--maxkb=1000]
      # Normalize line endings to LF
      - id: mixed-line-ending
        args: [--fix=lf]

# TODO: Review and finalize gitleaks configuration for this project
  # ============================================================================
  # Stage 2: Security Scanning (Detect secrets before any code analysis)
  # ============================================================================
  # Gitleaks: Prevent credentials/secrets from being committed
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # ============================================================================
  # Stage 3: Dependency Management (Keep lockfiles synchronized)
  # ============================================================================
  # uv: Fast Python package manager with lockfile support
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.18
    hooks:
      # Validate uv.lock stays synchronized with pyproject.toml
      - id: uv-lock
      # Ensure requirements.txt files stay in sync with uv.lock
      - id: uv-export
        args: [--all-extras]

  # ============================================================================
  # Stage 4: Code Formatting (Fix formatting issues automatically)
  # ============================================================================
  # Ruff formatter: Black-compatible Python code formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      # Format code according to project standards
      - id: ruff-format

  # ============================================================================
  # Stage 5: Code Linting (Check code quality and style rules)
  # ============================================================================
  # Ruff linter: Fast Python linter with 500+ rules (including Django-specific)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      # Check code quality and fix violations where possible
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # ============================================================================
  # Stage 6: Type Checking (Runs on pre-push to avoid blocking commits)
  # ============================================================================
  # Mypy: Static type checker for Python (slower, runs on pre-push stage only)
  # Pre-push stage allows commits to proceed quickly, while still catching type
  # errors before pushing to remote. Run locally with: pre-commit run -a -c
  # .pre-commit-config.yaml --hook-stage push
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        stages: [pre-push]
        additional_dependencies:
          - django==6.0
          - django-stubs==5.2.8
          - types-psycopg2
          - dj-database-url==2.2.0
        args: [--config-file=pyproject.toml]
        files: ^(allergies|users|skincare_project)/.*\.py$

  # ============================================================================
  # Stage 7: Custom Validation (Project-Specific Rules)
  # ============================================================================
  # Custom hook: Enforce logging standards in view files
  # Validates that all view files have logger setup or explicit exemption
  - repo: local
    hooks:
      - id: enforce-view-logging
        name: Enforce Logging in Views
        entry: python
        language: system
        types: [python]
        files: .*/views\.py$
        stages: [commit]
        pass_filenames: true
        args:
          - -c
          - |
            import sys
            import re
            from pathlib import Path

            LOGGER_PATTERN = r'logger\s*=\s*logging\.getLogger\(__name__\)'
            MINIMAL_VIEW_MARKER = r'#\s*minimal-view:\s*no-logger-needed'

            errors = []
            for filepath in sys.argv[1:]:
                path = Path(filepath)
                content = path.read_text(encoding='utf-8')

                # Check if file has logger setup
                has_logger = bool(re.search(LOGGER_PATTERN, content))
                has_exemption = bool(re.search(MINIMAL_VIEW_MARKER, content))

                if not has_logger and not has_exemption:
                    errors.append(
                        f"❌ {filepath}: Missing 'logger = logging.getLogger(__name__)' at module level.\n"
                        f"   Add logger or use '# minimal-view: no-logger-needed' for simple template renders.\n"
                        f"   See .github/instructions/copilot-instructions.md#logging-standards"
                    )

            if errors:
                print("\n🚨 View Logging Validation Failed:\n")
                for error in errors:
                    print(error)
                print("\n💡 Development Gate 2 requires logging in all views before implementing new features.")
                print("   See: .github/instructions/copilot-instructions.md#development-gates-strict-priority-order\n")
                sys.exit(1)

            sys.exit(0)

      - id: enforce-migration-naming
        name: Enforce Migration Naming Convention
        entry: python
        language: system
        types: [python]
        files: ^(allergies|users)/migrations/[^/]+\.py$
        stages: [commit]
        pass_filenames: true
        args:
          - -c
          - |
            import sys
            import re
            from pathlib import Path

            # Reject Django's auto-generated timestamp names: 0001_auto_20260303_1234.py
            AUTO_NAME_PATTERN = re.compile(r'^\d{4}_auto_\d+\.py$')

            errors = []
            for filepath in sys.argv[1:]:
                filename = Path(filepath).name

                # Always allow __init__.py
                if filename == '__init__.py':
                    continue

                if AUTO_NAME_PATTERN.match(filename):
                    errors.append(
                        f"❌ {filepath}: Auto-generated migration name '{filename}' is not allowed.\n"
                        f"   Rename using: uv run python manage.py makemigrations <app> --name <descriptive_name>\n"
                        f"   Example: uv run python manage.py makemigrations allergies --name add_severity_to_userallergy"
                    )

            if errors:
                print("\n🚨 Migration Naming Validation Failed:\n")
                for error in errors:
                    print(error)
                print("\n💡 Migration names must be descriptive, not auto-generated timestamps.")
                print("   See: .github/instructions/copilot-instructions.md#gotchas\n")
                sys.exit(1)

            sys.exit(0)

