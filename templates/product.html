{% extends 'layout.html'%}

{% block title %}
Product Input — Allergies Filter App
{% endblock %}

{% block content %}
    <h2>Product Ingredient Input</h2>
    <form method="post">
        {% csrf_token %}
        <label for="ingredients">Enter product ingredients:</label>
        <textarea id="ingredients" name="ingredients" rows="4" cols="50"></textarea>
        <button type="submit">Filter Products</button>
    </form>
    <p>Go back to <a href="{% url 'home' %}">Home Page</a></p>

    <footer>
        <p>&copy; 2026 Allergies Filter App</p>
    </footer>
{% endblock %}
